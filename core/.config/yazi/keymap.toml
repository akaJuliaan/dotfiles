[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = ["M","s"]
run  = "plugin sshfs -- menu"
desc = "Open SSHFS options"

[[mgr.prepend_keymap]]
on   = [ "g", "s" ]
run  = "cd sftp://paris"
desc = "Go to paris"

[[mgr.prepend_keymap]]
on  = "y"
run = [ 'shell -- for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list', "yank" ]

[[mgr.prepend_keymap]]
on = ["C", "p"]
run = 'shell ~/.local/bin/yazi/wlpaste --block'
desc = "Paste from clipboard"
